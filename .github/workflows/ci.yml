name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run ty check
      - run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # pnpm 版本由 frontend/package.json 的 packageManager 字段决定(action 默认只读根目录 package.json,需显式指定)
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run format:check
      - run: pnpm run test:run
      - run: pnpm run build

  # 依赖漏洞扫描:新引入,先 continue-on-error 观察一阵,不阻塞 CI
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      # 审计锁定依赖本身(uv export),而不是 uv run --with pip-audit 的混合环境(会把审计器自身依赖算进来)
      # 步骤级 continue-on-error:job 已是观察模式,此处保证 pip-audit 有发现时 pnpm audit 仍会执行
      - name: pip-audit (backend)
        working-directory: backend
        continue-on-error: true
        run: |
          uv export --locked --no-hashes --format requirements-txt -o /tmp/fund-watch-req.txt
          uvx pip-audit -r /tmp/fund-watch-req.txt
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: frontend/package.json
      # pnpm audit 只读 package.json/pnpm-lock.yaml,无需先 install(runner 自带 node;失败由 continue-on-error 兜住)
      - name: pnpm audit (frontend)
        working-directory: frontend
        run: pnpm audit

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend, frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      # PR 只构建验证,push main 才登录并推 GHCR
      - if: github.event_name == 'push'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/nikoace-clais/fund-watch:latest
            ghcr.io/nikoace-clais/fund-watch:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
